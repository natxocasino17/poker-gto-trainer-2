name: poker_gto_trainer
description: iPT - iPoker Training. Entrenador profesional de Texas Hold'em 6-Max
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/zeros_avatar.png
    - assets/ipt_logo.png
    - assets/lobby_bg.jpg
    - assets/avatars/
    - assets/audio/
    - assets/backgrounds/
